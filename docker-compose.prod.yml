# Production docker-compose for PekoHub
# Usage: docker-compose -f docker-compose.prod.yml up -d
#
# Required environment variables (set in .env or export):
#   DATABASE_URL, S3_*, MEILISEARCH_*, JWT_SECRET,
#   GITHUB_CLIENT_ID, GITHUB_CLIENT_SECRET,
#   GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET,
#   REGISTRY_BASE_URL

services:
  db:
    image: postgres:16-alpine
    container_name: pekohub-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pekohub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-in-production}
      POSTGRES_DB: ${POSTGRES_DB:-pekohub}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pekohub}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pekohub

  meilisearch:
    image: getmeili/meilisearch:v1.9
    container_name: pekohub-meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_API_KEY:-change-me}
    volumes:
      - meilisearchdata:/meili_data
    networks:
      - pekohub

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: pekohub-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      DATABASE_URL: ${DATABASE_URL}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-false}
      MEILISEARCH_URL: ${MEILISEARCH_URL:-http://meilisearch:7700}
      MEILISEARCH_API_KEY: ${MEILISEARCH_API_KEY}
      JWT_SECRET: ${JWT_SECRET}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      REGISTRY_BASE_URL: ${REGISTRY_BASE_URL}
      ALLOW_DEV_AUTH_BYPASS: "false"
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-1000}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      GC_ENABLED: "true"
      GC_INTERVAL_MS: ${GC_INTERVAL_MS:-86400000}
      GC_RETENTION_DAYS: ${GC_RETENTION_DAYS:-7}
      GC_BATCH_SIZE: ${GC_BATCH_SIZE:-1000}
    depends_on:
      db:
        condition: service_healthy
      meilisearch:
        condition: service_started
    networks:
      - pekohub

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ${REGISTRY_BASE_URL}
    container_name: pekohub-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - pekohub

  # Optional: Nginx reverse proxy for SSL termination
  # Replace with Cloudflare origin certs or AWS ALB in production
  nginx:
    image: nginx:alpine
    container_name: pekohub-nginx
    restart: unless-stopped
    ports:
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - pekohub
    profiles:
      - with-nginx

volumes:
  pgdata:
  meilisearchdata:

networks:
  pekohub:
    driver: bridge
