# PekoHub Production Stack for AWS Lightsail
#
# This single-instance deployment runs the backend + database + search on one host.
# Frontend is served separately by Cloudflare Pages (free CDN).
# Blob storage uses Cloudflare R2 (free 10GB tier).
#
# Prerequisites on the Lightsail instance:
#   1. Docker + docker-compose installed
#   2. Static IP attached
#   3. Ports 22 (SSH), 80 (HTTP) open
#   4. GitHub deploy key added (for Actions SSH access)
#
# Usage:
#   docker compose -f docker-compose.lightsail.yml up -d

services:
  # ── PostgreSQL ──────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: pekohub-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pekohub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-CHANGE_ME_IN_PRODUCTION}
      POSTGRES_DB: ${POSTGRES_DB:-pekohub}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pekohub}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pekohub

  # ── Meilisearch ─────────────────────────────────────────────
  meilisearch:
    image: getmeili/meilisearch:v1.9
    container_name: pekohub-meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_API_KEY:-CHANGE_ME_MASTER_KEY}
    volumes:
      - meilisearchdata:/meili_data
    healthcheck:
      # Meilisearch exposes /health (200 once the master key is valid).
      # Use wget --spider so we don't need a separate curl image.
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - pekohub

  # ── Backend API ─────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: pekohub-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"  # Bound to localhost only — nginx proxies
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      DATABASE_URL: postgres://${POSTGRES_USER:-pekohub}:${POSTGRES_PASSWORD:-CHANGE_ME_IN_PRODUCTION}@db:5432/${POSTGRES_DB:-pekohub}
      # R2 (S3-compatible) blob storage
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_REGION: ${S3_REGION:-auto}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET:-pekohub-blobs}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-false}
      MEILISEARCH_URL: http://meilisearch:7700
      MEILISEARCH_API_KEY: ${MEILISEARCH_API_KEY}
      JWT_SECRET: ${JWT_SECRET}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      REGISTRY_BASE_URL: ${REGISTRY_BASE_URL:-https://api.pekohub.ai}
      FRONTEND_URL: https://pekohub.ai
      ALLOW_DEV_AUTH_BYPASS: "false"
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-1000}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      GC_ENABLED: "true"
      GC_INTERVAL_MS: ${GC_INTERVAL_MS:-86400000}
      GC_RETENTION_DAYS: ${GC_RETENTION_DAYS:-7}
      GC_BATCH_SIZE: ${GC_BATCH_SIZE:-1000}
    healthcheck:
      # The Dockerfile already declares HEALTHCHECK, but compose's
      # `depends_on.condition: service_healthy` only consults the
      # healthcheck declared *in the compose file*, so we duplicate
      # the same probe here.
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', r => r.statusCode === 200 ? process.exit(0) : process.exit(1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      db:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    networks:
      - pekohub

  # ── Nginx Reverse Proxy ─────────────────────────────────────
  # Cloudflare → Nginx (port 80) → Backend (port 3000)
  # Frontend is served separately by Cloudflare Pages
  nginx:
    image: nginx:alpine
    container_name: pekohub-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/lightsail.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        # Don't start accepting traffic until the backend is up.
        condition: service_healthy
    networks:
      - pekohub

volumes:
  pgdata:
  meilisearchdata:

networks:
  pekohub:
    driver: bridge
