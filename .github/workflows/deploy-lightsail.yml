name: Deploy Backend to Lightsail

# Deploys backend to AWS Lightsail via SSH + docker-compose.
# Triggered only on pushes to master that touch backend code.
#
# ── Opt-in: [lightsail] keyword OR workflow_dispatch ─────────
# Two ways to trigger a deploy:
#
#   1. Push with `[lightsail]` in the commit subject — for normal
#      deploys that ride along with a code change:
#        git commit -m "feat(api): add endpoint [lightsail]"
#
#   2. workflow_dispatch (Actions UI "Run workflow" button, or
#      `gh workflow run deploy-lightsail.yml --ref master`) —
#      for one-off redeploys, recovery, or the "I just want to
#      redeploy the current master" case. No commit required, no
#      keyword required. The dispatch IS the explicit opt-in.
#
# For PR merges, add `[lightsail]` to the merge / squash commit
# message in the GitHub UI before clicking "Merge". If the keyword
# is absent from a push, the deploy step is skipped (not failed)
# with a clear notice.
#
# ── Architecture ──────────────────────────────────────────────
# The deploy logic lives in `infra/lightsail/deploy.sh` so it is
# versioned with the code, not duplicated as an inlined bash heredoc.
# This workflow is a thin wrapper: it syncs the repo to HEAD on the
# remote, then runs the script. The script is fully idempotent —
# it handles fresh instances, patch updates, and re-runs after a
# failed deploy (see file header in deploy.sh for the contract).
#
# Required GitHub Secrets:
#   LIGHTSAIL_HOST          - Static IP of your Lightsail instance
#   LIGHTSAIL_USER          - SSH user (usually 'ubuntu')
#   LIGHTSAIL_SSH_KEY       - Private key contents for SSH access
#   REGISTRY_BASE_URL       - https://api.pekohub.ai (or https://pekohub.ai if same domain)
#   GH_CLIENT_ID            - GitHub OAuth app client ID (note: GITHUB_ prefix is reserved by Actions)
#   GH_CLIENT_SECRET        - GitHub OAuth app client secret
#   GOOGLE_CLIENT_ID        - (optional)
#   GOOGLE_CLIENT_SECRET    - (optional)
#   JWT_SECRET              - Long random string (min 32 chars)
#   POSTGRES_PASSWORD       - PostgreSQL password
#   MEILISEARCH_API_KEY     - Meilisearch master key
#   R2_ACCOUNT_ID           - Cloudflare R2 account ID
#   R2_ACCESS_KEY_ID        - R2 API token access key
#   R2_SECRET_ACCESS_KEY    - R2 API token secret key
#   R2_BUCKET               - R2 bucket name (e.g. pekohub-blobs)
#   R2_ENDPOINT             - R2 endpoint URL

on:
  push:
    branches: [main, master]
    paths:
      - 'backend/**'
      - 'packages/shared/**'
      - 'docker-compose.lightsail.yml'
      - 'nginx/lightsail.conf'
      - 'infra/lightsail/**'
      - '.github/workflows/deploy-lightsail.yml'
      - 'pnpm-lock.yaml'
  # Manual trigger: Actions UI "Run workflow" button, or
  #   gh workflow run deploy-lightsail.yml --ref master
  # Bypasses the [lightsail] keyword check — the dispatch itself
  # is the explicit opt-in. Useful for one-off redeploys and
  # recovery without a code change.
  workflow_dispatch:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @pekohub/shared build

      - name: Backend typecheck
        run: pnpm --filter @pekohub/backend typecheck

      - name: Frontend typecheck
        run: pnpm --filter @pekohub/frontend typecheck

      - name: Backend test
        run: pnpm --filter @pekohub/backend test -- --run

      - name: Frontend test
        run: pnpm --filter @pekohub/frontend test -- --run

  deploy:
    name: Deploy to Lightsail
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Need at least one commit's message to scan for the
          # [lightsail] keyword. fetch-depth: 1 keeps the checkout
          # fast — we only look at HEAD.
          fetch-depth: 1

      - name: Check for [lightsail] keyword in commit message
        id: check-keyword
        run: |
          # On a workflow_dispatch event there is no commit to check
          # — the dispatch itself is the explicit opt-in. Always
          # deploy in that case.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "::notice::Triggered via workflow_dispatch — proceeding with deploy."
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Push event: check the *subject* (first line) only, not
          # the full body. Merge commits put the PR description in
          # the body, which may legitimately contain the literal
          # text "[lightsail]" (e.g. quoting the deploy convention
          # in a docs PR). The opt-in lives in the subject by
          # convention:
          #   git commit -m "fix(db): widen prefix [lightsail]"
          subject=$(git log -1 --pretty=%s HEAD)
          echo "Commit subject: $subject"
          if echo "$subject" | grep -qF '[lightsail]'; then
            echo "::notice::Found [lightsail] in commit subject — proceeding with deploy."
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::No [lightsail] in commit subject — skipping deploy."
            echo "To trigger a deploy, include [lightsail] in the commit subject, or use 'Run workflow' from the Actions UI."
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy via SSH
        if: steps.check-keyword.outputs.should_deploy == 'true'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            APP_DIR="${APP_DIR:-$HOME/pekohub}"

            if [ ! -d "$APP_DIR/.git" ]; then
              echo "Cloning repository (first deploy on this host)..."
              git clone --branch master https://github.com/ConekoAI/pekohub.git "$APP_DIR"
            fi

            cd "$APP_DIR"
            echo "Syncing to origin/master..."
            git fetch origin
            git reset --hard origin/master

            # Write .env from GitHub Secrets. We use a single-quoted
            # heredoc so the remote shell does NOT expand $ or
            # backticks inside secret values — only the YAML-level
            # ${{ secrets.X }} interpolations are honored (those
            # happen on the runner before SSH). The default Lightsail
            # sshd does not AcceptEnv our custom var names, so we
            # can't use appleboy/ssh-action's `envs:` field here.
            cat > "$APP_DIR/.env" <<'ENVEOF'
            POSTGRES_USER=pekohub
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            POSTGRES_DB=pekohub
            MEILISEARCH_API_KEY=${{ secrets.MEILISEARCH_API_KEY }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            GITHUB_CLIENT_ID=${{ secrets.GH_CLIENT_ID }}
            GITHUB_CLIENT_SECRET=${{ secrets.GH_CLIENT_SECRET }}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            REGISTRY_BASE_URL=${{ secrets.REGISTRY_BASE_URL }}
            S3_ENDPOINT=${{ secrets.R2_ENDPOINT }}
            S3_REGION=auto
            S3_ACCESS_KEY=${{ secrets.R2_ACCESS_KEY_ID }}
            S3_SECRET_KEY=${{ secrets.R2_SECRET_ACCESS_KEY }}
            S3_BUCKET=${{ secrets.R2_BUCKET }}
            S3_FORCE_PATH_STYLE=false
            RATE_LIMIT_MAX=1000
            RATE_LIMIT_WINDOW_MS=60000
            GC_ENABLED=true
            GC_INTERVAL_MS=86400000
            GC_RETENTION_DAYS=7
            GC_BATCH_SIZE=1000
            ENVEOF
            chmod 600 "$APP_DIR/.env"

            # Source .env so deploy.sh can read the values as
            # $POSTGRES_PASSWORD etc.
            set -a
            # shellcheck disable=SC1091
            . "$APP_DIR/.env"
            set +a

            echo "Running deploy.sh..."
            bash infra/lightsail/deploy.sh

      - name: Verify public endpoint
        if: steps.check-keyword.outputs.should_deploy == 'true'
        run: |
          echo "Checking public health endpoint..."
          curl -sf ${{ secrets.REGISTRY_BASE_URL }}/health || {
            echo "WARNING: Public health check failed — Cloudflare may still be propagating"
            exit 0
          }
