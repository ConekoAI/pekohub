name: Deploy Backend to Lightsail

# Deploys backend to AWS Lightsail via SSH + docker-compose.
# Triggered only on pushes to master that touch backend code.
#
# ── Opt-in: [lightsail] keyword ───────────────────────────────
# This workflow is skipped on everyday pushes. To trigger a deploy,
# include the literal string `[lightsail]` (square brackets included)
# anywhere in the *headline* commit message:
#
#   git commit -m "feat(api): add bundle stats endpoint [lightsail]"
#   git commit -m "fix(db): widen api_keys.prefix [lightsail]"
#   # Or for an empty / trigger commit:
#   git commit --allow-empty -m "chore: redeploy [lightsail]"
#
# For PR merges, add `[lightsail]` to the merge / squash commit
# message in the GitHub UI before clicking "Merge". The keyword is
# checked against the commit at HEAD on the runner after the
# `actions/checkout` step. If the keyword is absent, the deploy
# step is skipped (not failed) with a clear notice.
#
# ── Architecture ──────────────────────────────────────────────
# The deploy logic lives in `infra/lightsail/deploy.sh` so it is
# versioned with the code, not duplicated as an inlined bash heredoc.
# This workflow is a thin wrapper: it syncs the repo to HEAD on the
# remote, then runs the script. The script is fully idempotent —
# it handles fresh instances, patch updates, and re-runs after a
# failed deploy (see file header in deploy.sh for the contract).
#
# Required GitHub Secrets:
#   LIGHTSAIL_HOST          - Static IP of your Lightsail instance
#   LIGHTSAIL_USER          - SSH user (usually 'ubuntu')
#   LIGHTSAIL_SSH_KEY       - Private key contents for SSH access
#   REGISTRY_BASE_URL       - https://api.pekohub.ai (or https://pekohub.ai if same domain)
#   GH_CLIENT_ID            - GitHub OAuth app client ID (note: GITHUB_ prefix is reserved by Actions)
#   GH_CLIENT_SECRET        - GitHub OAuth app client secret
#   GOOGLE_CLIENT_ID        - (optional)
#   GOOGLE_CLIENT_SECRET    - (optional)
#   JWT_SECRET              - Long random string (min 32 chars)
#   POSTGRES_PASSWORD       - PostgreSQL password
#   MEILISEARCH_API_KEY     - Meilisearch master key
#   R2_ACCOUNT_ID           - Cloudflare R2 account ID
#   R2_ACCESS_KEY_ID        - R2 API token access key
#   R2_SECRET_ACCESS_KEY    - R2 API token secret key
#   R2_BUCKET               - R2 bucket name (e.g. pekohub-blobs)
#   R2_ENDPOINT             - R2 endpoint URL

on:
  push:
    branches: [main, master]
    paths:
      - 'backend/**'
      - 'packages/shared/**'
      - 'docker-compose.lightsail.yml'
      - 'nginx/lightsail.conf'
      - 'infra/lightsail/**'
      - '.github/workflows/deploy-lightsail.yml'
      - 'pnpm-lock.yaml'

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @pekohub/shared build

      - name: Backend typecheck
        run: pnpm --filter @pekohub/backend typecheck

      - name: Frontend typecheck
        run: pnpm --filter @pekohub/frontend typecheck

      - name: Backend test
        run: pnpm --filter @pekohub/backend test -- --run

      - name: Frontend test
        run: pnpm --filter @pekohub/frontend test -- --run

  deploy:
    name: Deploy to Lightsail
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Need at least one commit's message to scan for the
          # [lightsail] keyword. fetch-depth: 1 keeps the checkout
          # fast — we only look at HEAD.
          fetch-depth: 1

      - name: Check for [lightsail] keyword in commit message
        id: check-keyword
        run: |
          msg=$(git log -1 --pretty=%B HEAD)
          echo "Headline commit message:"
          echo "----------------------------------------"
          echo "$msg"
          echo "----------------------------------------"
          if echo "$msg" | grep -qF '[lightsail]'; then
            echo "::notice::Found [lightsail] keyword — proceeding with deploy."
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::No [lightsail] keyword in commit message — skipping deploy."
            echo "To trigger a deploy, include [lightsail] in the commit message."
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy via SSH
        if: steps.check-keyword.outputs.should_deploy == 'true'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          script_stop: true
          # Secrets are passed as env vars to the remote shell. The
          # deploy script reads them and writes them to .env on the
          # host. No shell interpolation from YAML → no injection risk
          # from a malformed secret.
          envs: >-
            POSTGRES_PASSWORD,MEILISEARCH_API_KEY,JWT_SECRET,
            GH_CLIENT_ID,GH_CLIENT_SECRET,
            GOOGLE_CLIENT_ID,GOOGLE_CLIENT_SECRET,
            REGISTRY_BASE_URL,
            R2_ENDPOINT,R2_ACCESS_KEY_ID,R2_SECRET_ACCESS_KEY,R2_BUCKET
          script: |
            set -euo pipefail
            APP_DIR="${APP_DIR:-$HOME/pekohub}"

            if [ ! -d "$APP_DIR/.git" ]; then
              echo "Cloning repository (first deploy on this host)..."
              git clone --branch master https://github.com/ConekoAI/pekohub.git "$APP_DIR"
            fi

            cd "$APP_DIR"
            echo "Syncing to origin/master..."
            git fetch origin
            git reset --hard origin/master

            echo "Running deploy.sh..."
            bash infra/lightsail/deploy.sh

      - name: Verify public endpoint
        if: steps.check-keyword.outputs.should_deploy == 'true'
        run: |
          echo "Checking public health endpoint..."
          curl -sf ${{ secrets.REGISTRY_BASE_URL }}/health || {
            echo "WARNING: Public health check failed — Cloudflare may still be propagating"
            exit 0
          }
