name: Deploy Backend to Lightsail

# Deploys backend to AWS Lightsail via SSH + docker-compose
# Triggered only on pushes to master that touch backend code
#
# Required GitHub Secrets:
#   LIGHTSAIL_HOST          - Static IP of your Lightsail instance
#   LIGHTSAIL_USER          - SSH user (usually 'ubuntu')
#   LIGHTSAIL_SSH_KEY       - Private key contents for SSH access
#   REGISTRY_BASE_URL       - https://api.pekohub.org (or https://pekohub.org if same domain)
#   GH_CLIENT_ID            - GitHub OAuth app client ID (note: GITHUB_ prefix is reserved by Actions)
#   GH_CLIENT_SECRET        - GitHub OAuth app client secret
#   GOOGLE_CLIENT_ID        - (optional)
#   GOOGLE_CLIENT_SECRET    - (optional)
#   JWT_SECRET              - Long random string (min 32 chars)
#   POSTGRES_PASSWORD       - PostgreSQL password
#   MEILISEARCH_API_KEY     - Meilisearch master key
#   R2_ACCOUNT_ID           - Cloudflare R2 account ID
#   R2_ACCESS_KEY_ID        - R2 API token access key
#   R2_SECRET_ACCESS_KEY    - R2 API token secret key
#   R2_BUCKET               - R2 bucket name (e.g. pekohub-blobs)
#   R2_ENDPOINT             - R2 endpoint URL

on:
  push:
    branches: [main, master]
    paths:
      - 'backend/**'
      - 'packages/shared/**'
      - 'docker-compose.lightsail.yml'
      - 'nginx/lightsail.conf'
      - 'infra/lightsail/**'
      - '.github/workflows/deploy-lightsail.yml'

env:
  COMPOSE_FILE: docker-compose.lightsail.yml

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @pekohub/shared build

      - name: Backend typecheck
        run: pnpm --filter @pekohub/backend typecheck

      - name: Frontend typecheck
        run: pnpm --filter @pekohub/frontend typecheck

      - name: Backend test
        run: pnpm --filter @pekohub/backend test -- --run

      - name: Frontend test
        run: pnpm --filter @pekohub/frontend test -- --run

  deploy:
    name: Deploy to Lightsail
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail

            APP_DIR="$HOME/pekohub"
            COMPOSE_FILE="docker-compose.lightsail.yml"

            echo "=== PekoHub Deploy Started ==="
            echo "Time: $(date -u +%Y-%m-%dT%H:%M:%SZ)"

            # Ensure repo is cloned
            if [ ! -d "$APP_DIR/.git" ]; then
              echo "Cloning repository..."
              git clone https://github.com/ConekoAI/pekohub.git "$APP_DIR"
            fi

            cd "$APP_DIR"

            # Pull latest code
            echo "Pulling latest code..."
            git fetch origin
            git reset --hard origin/master

            # Write environment file
            echo "Writing environment config..."
            cat > .env <<EOF
            POSTGRES_USER=pekohub
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            POSTGRES_DB=pekohub
            MEILISEARCH_API_KEY=${{ secrets.MEILISEARCH_API_KEY }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            GITHUB_CLIENT_ID=${{ secrets.GH_CLIENT_ID }}
            GITHUB_CLIENT_SECRET=${{ secrets.GH_CLIENT_SECRET }}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            REGISTRY_BASE_URL=${{ secrets.REGISTRY_BASE_URL }}
            S3_ENDPOINT=${{ secrets.R2_ENDPOINT }}
            S3_REGION=auto
            S3_ACCESS_KEY=${{ secrets.R2_ACCESS_KEY_ID }}
            S3_SECRET_KEY=${{ secrets.R2_SECRET_ACCESS_KEY }}
            S3_BUCKET=${{ secrets.R2_BUCKET }}
            S3_FORCE_PATH_STYLE=false
            RATE_LIMIT_MAX=1000
            RATE_LIMIT_WINDOW_MS=60000
            GC_ENABLED=true
            GC_INTERVAL_MS=86400000
            GC_RETENTION_DAYS=7
            GC_BATCH_SIZE=1000
            EOF

            # Build and restart services
            echo "Building and restarting services..."
            docker-compose -f "$COMPOSE_FILE" pull
            # Stop backend before rebuild to avoid ContainerConfig bug in docker-compose v1
            docker-compose -f "$COMPOSE_FILE" stop backend || true
            docker-compose -f "$COMPOSE_FILE" rm -f backend || true
            docker-compose -f "$COMPOSE_FILE" up -d --build --no-deps backend

            # Run database migrations
            echo "Running database migrations..."
            docker-compose -f "$COMPOSE_FILE" exec -T backend npx drizzle-kit migrate --config=drizzle.config.ts || true

            # Cleanup old images
            echo "Cleaning up old Docker images..."
            docker image prune -af --filter "until=168h" || true

            # Health check
            echo "Waiting for services to start..."
            sleep 15

            echo "Running health checks..."
            curl -sf http://localhost:3000/health || {
              echo "ERROR: Backend health check failed"
              docker-compose -f "$COMPOSE_FILE" logs --tail=50 backend
              exit 1
            }

            echo "=== PekoHub Deploy Complete ==="
            echo "Backend: ${{ secrets.REGISTRY_BASE_URL }}"
            echo "API Docs: ${{ secrets.REGISTRY_BASE_URL }}/docs"

      - name: Verify public endpoint
        run: |
          echo "Checking public health endpoint..."
          curl -sf ${{ secrets.REGISTRY_BASE_URL }}/health || {
            echo "WARNING: Public health check failed — Cloudflare may still be propagating"
            exit 0
          }
